<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<link rel="stylesheet" href="leaderboard.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="navbar">
  <div class="logo">SkillRank</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="profile.html">Profile</a>
  </div>
</div>


<h1 class="title">Leaderboard</h1>


<div class="tabs">
  <button class="tab active">Overall</button>
</div>


<div class="filters">
  <input type="text" id="search" placeholder="Search Username...">

  <select id="category">
    <option value="all">All Categories</option>
    <option value="programming">Programming</option>
    <option value="aptitude">Aptitude</option>
    <option value="math">Mathematics</option>
    <option value="gk">General Knowledge</option>
  </select>
</div>

<!-- TOP 3 -->
<div class="top3" id="top3"></div>

<!-- TABLE -->
<table id="leaderboardTable">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Username</th>
      <th>Score</th>
      <th>Category</th>
    </tr>
  </thead>

  <tbody id="leaderboardBody"></tbody>
</table>

<!-- FOOTER -->
<div class="footer">
  © 2026 SkillRank
</div>

<script>

let allData = [];

// LOAD DATA
async function loadLeaderboard() {
  const res = await fetch("https://skillrank-backend-5gtc.onrender.com/api/leaderboard");
  allData = await res.json();

  renderLeaderboard(allData);
}

// RENDER FUNCTION
function renderLeaderboard(data) {

  // ===== TOP 3 =====
  let topHTML = "";

  if (data[1]) {
    topHTML += `
      <div class="card second">
        <h3>${data[1].username}</h3>
        <span>${data[1].score}</span>
      </div>`;
  }

  if (data[0]) {
    topHTML += `
      <div class="card first">
        <h3>${data[0].username}</h3>
        <span>${data[0].score}</span>
      </div>`;
  }

  if (data[2]) {
    topHTML += `
      <div class="card third">
        <h3>${data[2].username}</h3>
        <span>${data[2].score}</span>
      </div>`;
  }

  document.getElementById("top3").innerHTML = topHTML;

  // ===== TABLE =====
  let tableHTML = "";

  data.forEach(user => {
    tableHTML += `
      <tr>
        <td>${user.rank}</td>
        <td>${user.username}</td>
        <td>${user.score}</td>
        <td>${user.category}</td>
      </tr>
    `;
  });

  document.getElementById("leaderboardBody").innerHTML = tableHTML;
}

// SEARCH FILTER
document.getElementById("search").addEventListener("input", () => {
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(u =>
    u.username.toLowerCase().includes(value)
  );

  renderLeaderboard(filtered);
});

// CATEGORY FILTER
document.getElementById("category").addEventListener("change", () => {
  const value = document.getElementById("category").value;

  if (value === "all") {
    renderLeaderboard(allData);
    return;
  }

  const filtered = allData.filter(u =>
    u.category.toLowerCase() === value
  );

  renderLeaderboard(filtered);
});

loadLeaderboard();

</script>

</body>
</html>
