<html>
    <head>
        <title>Quiz Interface</title>
        <link rel="stylesheet" href="quizinter.css">
    </head>
    <body>
        <div class="top-bar">
            <h3 id="qNumber">Question 1 / 5</h3>
            <div class="timer" id="timer">60</div>
        </div>

        <div class="progress">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="question-box">
            <h2 id="question">Question text</h2>
            <div id="options"></div>
        </div>

        <div class="buttons">
            <button onclick="prevQuestion()">Previous</button>
            <button onclick="nextQuestion()">Next</button>
            <button onclick="submitQuiz()">Submit</button>
        </div>

<script>

/* ===== QUESTIONS DATA ===== */

const questions = [
  {
    q: "What does HTML stand for?",
    options: ["Hyper Text Markup Language", "High Transfer Machine Language", "Hyper Tool Multi Language", "None"],
    answer: 0
  },
  {
    q: "CSS is used for?",
    options: ["Structure", "Styling", "Database", "Logic"],
    answer: 1
  },
  {
    q: "JavaScript is?",
    options: ["Programming Language", "Database", "OS", "Browser"],
    answer: 0
  },
  {
    q: "2 + 2 = ?",
    options: ["3", "4", "5", "6"],
    answer: 1
  },
  {
    q: "Capital of India?",
    options: ["Chennai", "Mumbai", "Delhi", "Kolkata"],
    answer: 2
  }
];

/* RANDOMIZE QUESTIONS */
questions.sort(() => Math.random() - 0.5);

let current = 0;
let answers = new Array(questions.length).fill(null);

/* LOAD QUESTION */

function loadQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("qNumber").innerText = `Question ${current+1} / ${questions.length}`;

  let optionsHTML = "";
  q.options.forEach((opt, i) => {
    let selected = answers[current] === i ? "selected" : "";
    optionsHTML += `<div class="option ${selected}" onclick="selectOption(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;

  updateProgress();
}

/* SELECT OPTION */

function selectOption(i) {
  answers[current] = i;
  loadQuestion();
}

/* NAVIGATION */

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

/* PROGRESS BAR */

function updateProgress() {
  let progress = ((current+1) / questions.length) * 100;
  document.getElementById("progress").style.width = progress + "%";
}

/* TIMER */

let time = 60;

let timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = time;

  if (time <= 20) {
    document.getElementById("timer").style.color = "#FACC15";
  }

  if (time <= 10) {
    document.getElementById("timer").style.color = "#EF4444";
  }

  if (time === 0) {
    clearInterval(timer);
    submitQuiz();
  }

}, 1000);

/* SUBMIT */

function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {
    if (answers[i] === q.answer) score++;
  });

  alert("Your Score: " + score + "/" + questions.length);
}

/* INIT */

loadQuestion();

</script>
    </body>
</html>
