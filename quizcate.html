<html>
    <head>
        <title>Quiz Categorise</title>
        <link rel="stylesheet" href="quizcate.css">
    </head>

    <body>
        <div class="header">
  <h1>Explore Quiz Categories</h1>
  <p>Choose a category and start testing your skills</p>
</div>

  <div class="grid">
      <div class="r1">
        <div class="card">
          <h2>Programming</h2>
          <p>Questions: 20</p>
          <p>Difficulty: <span class="medium">Medium</span></p>
          <button>Start Quiz</button>
        </div>
        <div class="card">
          <h2>Aptitude</h2>
          <p>Questions: 15</p>
          <p>Difficulty: <span class="easy">Easy</span></p>
          <button>Start Quiz</button>
        </div>
      </div>
      <div class="r2">
        <div class="card">
          <h2>General Knowledge</h2>
          <p>Questions: 25</p>
          <p>Difficulty: <span class="medium">Medium</span></p>
          <button>Start Quiz</button>
        </div>
         <div class="card">
          <h2>Mathematics</h2>
          <p>Questions: 18</p>
          <p>Difficulty: <span class="hard">Hard</span></p>
          <button>Start Quiz</button>
        </div>

      </div>



  </div>
</body>
</html>
