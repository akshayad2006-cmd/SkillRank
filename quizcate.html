<!DOCTYPE html>
<html>
<head>
  <title>Select Quiz</title>
  <link rel="stylesheet" href="quizcate.css">
</head>

<body>

<div class="header">
  <h1>Select Quiz Category</h1>
  <p>Choose a domain to test your skills</p>
</div>

<div class="r1">
  <div class="card">
    <h2>Programming</h2>
    <p class="easy">Easy</p>
    <button onclick="startQuiz('programming')">Start Quiz</button>
  </div>

  <div class="card">
    <h2>Aptitude</h2>
    <p class="medium">Medium</p>
    <button onclick="startQuiz('aptitude')">Start Quiz</button>
  </div>
</div>

<div class="r2">
  <div class="card">
    <h2>Mathematics</h2>
    <p class="medium">Medium</p>
    <button onclick="startQuiz('math')">Start Quiz</button>
  </div>

  <div class="card">
    <h2>General Knowledge</h2>
    <p class="easy">Easy</p>
    <button onclick="startQuiz('gk')">Start Quiz</button>
  </div>
</div>

<script>
function startQuiz(category) {
  localStorage.setItem("category", category);
  window.location.href = "quizinter.html";
}
</script>

</body>
</html>
