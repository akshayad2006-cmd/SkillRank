<html>
    <head>
        <title>Performance</title>
        <link rel="stylesheet" href="performance.css">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <h1>Performance Analytics</h1>

        <!-- SUMMARY -->
        <div class="summary">
        <div class="card">
            <h3>Best Category</h3>
            <p>Programming</p>
        </div>

        <div class="card">
            <h3>Weakest Category</h3>
            <p>Mathematics</p>
        </div>

        <div class="card">
            <h3>Progress</h3>
            <p>Improving steadily </p>
        </div>
        </div>

        <!-- CHART 1 -->
        <div class="chart-box">
        <h3>Score vs Time</h3>
        <canvas id="scoreChart"></canvas>
        </div>

        <!-- CHART 2 -->
        <div class="chart-box">
        <h3>Accuracy vs Quizzes</h3>
        <canvas id="accuracyChart"></canvas>
        </div>

        <!-- CHART 3 -->
        <div class="chart-box">
        <h3>Quiz Attempts per Category</h3>
        <canvas id="categoryChart"></canvas>
        </div>
        <script>

            /* SAMPLE DATA */

            const labels = ["Quiz1","Quiz2","Quiz3","Quiz4","Quiz5"];

            const scores = [60, 70, 80, 75, 90];
            const accuracy = [60, 70, 80, 75, 90];

            /* SCORE CHART */

            new Chart(document.getElementById("scoreChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                label: "Score",
                data: scores,
                borderColor: "#8B5CF6",
                fill: false
                }]
            }
            });

            /* ACCURACY CHART */

            new Chart(document.getElementById("accuracyChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                label: "Accuracy",
                data: accuracy,
                borderColor: "#22D3EE",
                fill: false
                }]
            }
            });

            /* CATEGORY CHART */

            new Chart(document.getElementById("categoryChart"), {
            type: "bar",
            data: {
                labels: ["Programming", "Aptitude", "GK", "Math"],
                datasets: [{
                label: "Attempts",
                data: [10, 5, 7, 3],
                backgroundColor: "#8B5CF6"
                }]
            }
            });

</script>
    </body>
</html>
