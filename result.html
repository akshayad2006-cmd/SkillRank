<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result</title>
  <link rel="stylesheet" href="resultpage.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
  <div class="logo">SkillRank</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="leaderboard.html"> Leaderboard</a>
    <a href="profile.html"> Profile</a>
  </div>
</div>

<div class="container">

  <div class="result-card">
    <h1>Quiz Completed!</h1>

    <div class="score">18 / 20</div>
    <p class="accuracy">Accuracy: 90%</p>

    <p class="feedback">Excellent! You're a top performer!</p>
  </div>

  <div class="stats">

    <div class="stat-box">
      <h3>Total Questions</h3>
      <p>20</p>
    </div>

    <div class="stat-box correct">
      <h3>Correct</h3>
      <p>18</p>
    </div>

    <div class="stat-box wrong">
      <h3>Wrong</h3>
      <p>2</p>
    </div>

    
  </div>



  <div class="buttons">
    <button class="primary">Retake Quiz</button>
    <button class="secondary">Dashboard</button>
    <button class="leaderboard">Leaderboard</button>
  </div>
</div>

<div class="footer">
  © 2026 SkillRank | Contact | About
</div>
<script>

const score = Number(localStorage.getItem("score")) || 0;
const total = Number(localStorage.getItem("total")) || 0;

let correct = score;
let wrong = total - score;
let accuracy = total ? Math.round((score / total) * 100) : 0;


document.querySelector(".score").innerText = `${score} / ${total}`;
document.querySelector(".accuracy").innerText = `Accuracy: ${accuracy}%`;

let feedback = "Good Job!";
if (accuracy >= 90) feedback = "Excellent! You're a top performer!";
else if (accuracy >= 70) feedback = "Great Work!";
else if (accuracy >= 50) feedback = "Keep Practicing!";
else feedback = "Needs Improvement!";

document.querySelector(".feedback").innerText = feedback;

document.querySelectorAll(".stat-box p")[0].innerText = total;
document.querySelectorAll(".stat-box p")[1].innerText = correct;
document.querySelectorAll(".stat-box p")[2].innerText = wrong;

document.querySelector(".primary").onclick = () => {
  window.location.href = "quizcate.html";
};

document.querySelector(".secondary").onclick = () => {
  window.location.href = "dashboard.html";
};

document.querySelector(".leaderboard").onclick = () => {
  window.location.href = "leaderboard.html";
};

</script>
</body>
</html>
