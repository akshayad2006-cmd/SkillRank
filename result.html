<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result</title>
  <link rel="stylesheet" href="resultpage.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SkillRank</div>
  <div class="nav-links">
    <a href="#">Dashboard</a>
    <a href="#">Leaderboard</a>
    <a href="#">Profile</a>
  </div>
</div>

<!-- RESULT CONTAINER -->
<div class="container">

  <!-- RESULT CARD -->
  <div class="result-card">
    <h1>Quiz Completed!</h1>

    <div class="score">18 / 20</div>
    <p class="accuracy">Accuracy: 90%</p>

    <p class="feedback">Excellent! You're a top performer!</p>
  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="stat-box">
      <h3>Total Questions</h3>
      <p>20</p>
    </div>

    <div class="stat-box correct">
      <h3>Correct</h3>
      <p>18</p>
    </div>

    <div class="stat-box wrong">
      <h3>Wrong</h3>
      <p>2</p>
    </div>

    <div class="stat-box time">
      <h3>Time Taken</h3>
      <p>5 min</p>
    </div>
  </div>



  <!-- BUTTONS -->
  <div class="buttons">
    <button class="primary">Retake Quiz</button>
    <button class="secondary">Dashboard</button>
    <button class="leaderboard">Leaderboard</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 SkillRank | Contact | About
</div>
<script>
const score = localStorage.getItem("score");
const total = localStorage.getItem("total");

document.querySelector(".score").innerText = `${score} / ${total}`;

let accuracy = Math.round((score / total) * 100);
document.querySelector(".accuracy").innerText = `Accuracy: ${accuracy}%`;

// feedback
let feedback = "Good Job!";
if (accuracy > 90) feedback = "Excellent!";
if (accuracy < 50) feedback = "Keep Practicing!";

document.querySelector(".feedback").innerText = feedback;

// buttons
document.querySelector(".primary").onclick = () => {
  window.location.href = "quizcate.html";
};

document.querySelector(".secondary").onclick = () => {
  window.location.href = "dashboard.html";
};

document.querySelector(".leaderboard").onclick = () => {
  window.location.href = "leaderboard.html";
};
</script>
</body>
</html>
